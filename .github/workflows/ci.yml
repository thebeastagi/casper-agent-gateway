name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: |
          npx tsc --noEmit -p packages/core/tsconfig.json
          npx tsc --noEmit -p packages/gateway/tsconfig.json
          npx tsc --noEmit -p packages/mcp-server/tsconfig.json
          npx tsc --noEmit -p packages/agent-sdk/tsconfig.json

      - name: Lint (future)
        run: echo "Linting will be added"

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/contract/Cargo.toml') }}

      - name: Check contract compiles
        run: |
          cd packages/contract
          cargo check --target wasm32-unknown-unknown