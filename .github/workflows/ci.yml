name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Gateway smoke test
        run: |
          npm run gateway &
          GATEWAY_PID=$!
          for i in $(seq 1 20); do
            sleep 1
            if curl -sf http://localhost:3456/api/v1/health > /dev/null; then break; fi
          done
          curl -sf http://localhost:3456/api/v1/health
          # Paid endpoint must answer 402 without an X-Payment header
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3456/api/v1/agents/register -H "Content-Type: application/json" -d '{}')
          test "$STATUS" = "402"
          kill $GATEWAY_PID

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/contract/Cargo.toml') }}

      - name: Check contract compiles
        run: |
          cd packages/contract
          cargo check --target wasm32-unknown-unknown